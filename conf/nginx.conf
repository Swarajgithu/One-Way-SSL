# =============================================================================
# NGINX CONFIGURATION FOR ONE-WAY SSL/TLS (HTTPS)
# =============================================================================
#
# This configuration enables HTTPS (one-way SSL) on port 443.
# The server presents its certificate to clients for validation.
#
# ONE-WAY SSL EXPLANATION:
# ------------------------
# - Server has: Private Key + Certificate
# - Client has: List of trusted CA certificates (in browser/OS)
# - During handshake: Server sends certificate, client validates it
# - Result: Encrypted connection where client trusts server's identity
#
# =============================================================================

# Number of worker processes (auto = match CPU cores)
worker_processes auto;

# Error log location
error_log logs/error.log;

events {
    worker_connections 1024;
}

http {
    # Include MIME types
    include       mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log logs/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # =========================================================================
    # HTTPS SERVER BLOCK (One-Way SSL)
    # =========================================================================
    server {
        # Listen on port 443 with SSL enabled
        listen 443 ssl;
        server_name localhost;

        # ---------------------------------------------------------------------
        # SSL CERTIFICATE CONFIGURATION
        # ---------------------------------------------------------------------
        # ssl_certificate: The server's public certificate
        #   - This is sent to clients during the TLS handshake
        #   - Contains: Public key, domain info, validity dates, issuer info
        #   - Clients use this to verify server identity and encrypt data
        #
        # ssl_certificate_key: The server's private key
        #   - NEVER shared with anyone
        #   - Used to decrypt data encrypted with the public key
        #   - Used to create digital signatures proving ownership
        # ---------------------------------------------------------------------
        
        # Path to SSL certificate (adjust path as needed)
        ssl_certificate      ../certs/server.crt;
        ssl_certificate_key  ../certs/server.key;

        # ---------------------------------------------------------------------
        # SSL PROTOCOL CONFIGURATION
        # ---------------------------------------------------------------------
        # Only allow TLS 1.2 and 1.3 (modern, secure protocols)
        # TLS 1.0 and 1.1 are deprecated and have known vulnerabilities
        # SSL 2.0 and 3.0 are completely insecure and disabled by default
        # ---------------------------------------------------------------------
        ssl_protocols TLSv1.2 TLSv1.3;

        # ---------------------------------------------------------------------
        # CIPHER SUITES
        # ---------------------------------------------------------------------
        # Ciphers determine how encryption is performed
        # Using modern, secure cipher suites with forward secrecy
        # Forward secrecy: Even if private key is compromised later,
        #                  past communications cannot be decrypted
        # ---------------------------------------------------------------------
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;

        # SSL session caching for performance
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ---------------------------------------------------------------------
        # DOCUMENT ROOT
        # ---------------------------------------------------------------------
        root ../html;
        index index.html;

        # Main location block
        location / {
            try_files $uri $uri/ =404;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }

    # =========================================================================
    # HTTP to HTTPS Redirect (Optional)
    # =========================================================================
    # Uncomment this block to redirect HTTP (port 80) to HTTPS (port 443)
    # =========================================================================
    # server {
    #     listen 80;
    #     server_name localhost;
    #     return 301 https://$server_name$request_uri;
    # }
}
