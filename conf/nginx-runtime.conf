# Nginx configuration for One-Way SSL Demo
worker_processes auto;
error_log C:/Users/swara/OneDrive/Desktop/ONEWAYSSL/ssl-demo/ssl-demo/logs/error.log;
pid C:/Users/swara/OneDrive/Desktop/ONEWAYSSL/ssl-demo/ssl-demo/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       C:/Users/swara/OneDrive/Desktop/ONEWAYSSL/ssl-demo/ssl-demo/nginx/conf/mime.types;
    default_type  application/octet-stream;

    access_log C:/Users/swara/OneDrive/Desktop/ONEWAYSSL/ssl-demo/ssl-demo/logs/access.log;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate      C:/Users/swara/OneDrive/Desktop/ONEWAYSSL/ssl-demo/ssl-demo/certs/server.crt;
        ssl_certificate_key  C:/Users/swara/OneDrive/Desktop/ONEWAYSSL/ssl-demo/ssl-demo/certs/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        root C:/Users/swara/OneDrive/Desktop/ONEWAYSSL/ssl-demo/ssl-demo/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
